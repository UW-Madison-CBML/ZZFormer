model:
  d_model: 256                 # → LongformerConfig.hidden_size
  nhead: 2                     # → num_attention_heads (must divide d_model: 256/2 = 128 ✓)
  num_layers: 4                # MUST equal len(k_mers)
  dim_feedforward: 1024        # → intermediate_size
  dropout: 0.1                 # → hidden_dropout_prob & attention_probs_dropout_prob
  max_seq_len: 1024            # actual nucleotide tokens per sequence
  vocab_size: 9                # PAD,a,c,g,t,x,BOS,EOS,MASK

  # ── Longformer ──
  attention_window: 256        # 1024 / 256 = 4 ✓
  max_position_embeddings: 1026  # MUST be >= max_seq_len + 2 (room for BOS/EOS)

  # ── Topology cross-attention (new) ──
  k_mers: [4, 8, 14, 20]       # one per Longformer layer; len(k_mers) == num_layers
  topology_latent_dim: 64      # per-k-mer PI embedding dim (B, 64)

  # ── Head / pooling ──
  classifier_hidden_dim: 256
  pool: bos                    # "bos" (recommended) or "mean"

# Optional, passed straight into the tree:
label_smoothing: 0.0
gamma: 0.0

train:
  batchsize: 512               # ⚠ see note below — may need to drop
  num_workers: 16
  lr: 0.0001
  epochs: 300

wandb:
  team: kkumari-university-of-wisconsin-madison
  project: ZZFORMER_Terrierlabeling
  dir: /tmp/wandb

dir:
  save_dir: /staging/kkumari/terrsystem/ZZFormer/